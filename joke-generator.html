<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Random Joke Generator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            text-align: center;\n            margin-top: 50px;\n        }\n        .joke {\n            font-size: 24px;\n            margin: 20px;\n        }\n        button {\n            padding: 10px 20px;\n            font-size: 16px;\n            cursor: pointer;\n            border: none;\n            background-color: #28a745;\n            color: white;\n            border-radius: 5px;\n        }\n        button:hover {\n            background-color: #218838;\n        }\n    </style>\n</head>\n<body>\n    <h1>Random Joke Generator</h1>\n    <div class=\"joke\" id=\"joke\">Click the button to get a random joke!</div>\n    <button id=\"jokeButton\">Get Joke</button>\n    <script>\n        const jokeButton = document.getElementById('jokeButton');\n        const jokeDisplay = document.getElementById('joke');\n\n        async function fetchJoke() {\n            try {\n                const response = await fetch('https://v2.jokeapi.dev/joke/Any');\n                if (!response.ok) {\n                    throw new Error('Network response was not ok' + response.statusText);\n                }\n                const data = await response.json();\n                jokeDisplay.innerHTML = data.joke ? data.joke : `${data.setup} - ${data.delivery}`;\n            } catch (error) {\n                jokeDisplay.innerHTML = 'Failed to fetch a joke. Please try again later.';\n                console.error('Error fetching joke:', error);\n            }\n        }\n\n        jokeButton.addEventListener('click', fetchJoke);\n    <\/script>\n</body>\n</html>
